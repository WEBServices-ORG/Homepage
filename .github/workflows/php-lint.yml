name: PHP Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  php-lint:
    name: Lint wp-theme PHP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Validate PHP syntax
        run: |
          set -euo pipefail
          files=$(find wp-theme -type f -name '*.php')
          if [ -z "$files" ]; then
            echo "No PHP files found in wp-theme"
            exit 0
          fi
          while IFS= read -r file; do
            echo "Linting $file"
            php -l "$file"
          done <<< "$files"
