name: HTML Lint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  html-lint:
    name: Validate HTML Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install htmlhint
        run: npm install --global htmlhint

      - name: Lint HTML
        run: |
          set -euo pipefail
          files=$(find . -type f -name "*.html" -not -path "./.git/*")
          if [ -z "$files" ]; then
            echo "No HTML files found"
            exit 0
          fi
          while IFS= read -r file; do
            echo "Linting $file"
            htmlhint "$file"
          done <<< "$files"
