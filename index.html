<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0b0b0b" />
  <title>WEBServices</title>

  <style>
    :root{
      --bg:#050505;
      --panel:#0b0b0b;
      --text:#e8e8e8;
      --muted:#cfcfcf;
      --muted2:#9a9a9a;
      --border:#171717;

      /* Single accent (purple/indigo) */
      --accent:#4f46e5;
      --accentSoft:rgba(79,70,229,.15);
      --accentGlow:rgba(79,70,229,.35);

      /* Fonts: one for headings, one for body */
      --fontHead: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      --fontBody: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;

      --radius:14px;
      --shadow: 0 0 0 rgba(0,0,0,0);
      --max: 980px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background: radial-gradient(1200px 600px at 50% -10%, rgba(79,70,229,.10), transparent 60%) , var(--bg);
      color:var(--text);
      font-family:var(--fontBody);
      line-height:1.45;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    a{ color:inherit; }
    .container{
      width:100%;
      max-width:var(--max);
      margin:0 auto;
      padding:32px 18px 48px;
    }

    /* Header */
    header{
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      padding:10px 0 6px;
    }
    .brand{
      font-family:var(--fontHead);
      font-weight:650;
      letter-spacing:.3px;
      font-size:22px;
      margin:0;
      text-align:center;
    }
    .gh-link{
      position:absolute;
      right:0;
      top:50%;
      transform:translateY(-50%);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:34px;
      height:34px;
      border-radius:10px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.02);
      text-decoration:none;
    }
    .gh-link:hover{
      border-color:rgba(79,70,229,.55);
      box-shadow: 0 0 18px rgba(79,70,229,.18);
    }
    .gh-link svg{ width:18px; height:18px; opacity:.9; }

    /* Hero */
    .hero{
      margin:18px 0 34px;
      padding:14px 0 0;
      text-align:center;
    }
    .hero p{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    /* Section titles */
    .section-title{
      font-family:var(--fontHead);
      font-size:14px;
      letter-spacing:.5px;
      text-transform:uppercase;
      color:var(--muted2);
      margin:40px 0 14px;
    }

    /* Products grid */
    .products{
      display:grid;
      grid-template-columns: repeat( auto-fit, minmax(280px, 1fr) );
      gap:16px;
      align-items:stretch;
    }

    /* Product card */
    .product-card{
      background:var(--panel);
      border:1px solid rgba(79,70,229,.65);
      border-radius:var(--radius);
      padding:22px;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
      box-shadow: var(--shadow);
      min-height: 160px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }
    .product-card:hover{
      transform: translateY(-3px);
      box-shadow: 0 0 24px var(--accentGlow);
      border-color: var(--accent);
    }

    .product-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }
    .product-header h3{
      margin:0;
      font-family:var(--fontHead);
      font-size:18px;
      font-weight:650;
      letter-spacing:.2px;
    }
    .badge{
      font-size:11px;
      padding:4px 8px;
      border-radius:8px;
      text-transform:uppercase;
      letter-spacing:.4px;
      border:1px solid transparent;
      white-space:nowrap;
    }
    .badge.oss{
      background:var(--accentSoft);
      color:#a5b4fc;
      border-color: rgba(79,70,229,.35);
    }
    .badge.coming{
      background: rgba(255,255,255,.06);
      color: #cfcfcf;
      border-color: rgba(255,255,255,.10);
    }

    .product-desc{
      margin:0 0 14px;
      color:var(--muted);
      font-size:13px;
      max-width: 60ch;
    }

    .product-links{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    .product-links a{
      color:#a5b4fc;
      text-decoration:none;
      font-size:13px;
      border:1px solid rgba(79,70,229,.25);
      padding:7px 10px;
      border-radius:10px;
      background: rgba(255,255,255,.02);
    }
    .product-links a:hover{
      text-decoration:none;
      border-color: rgba(79,70,229,.6);
      box-shadow: 0 0 14px rgba(79,70,229,.14);
    }

    /* Support */
    .support-row{
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }
    .support-row a{
      width:38px;
      height:38px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.02);
      text-decoration:none;
    }
    .support-row a:hover{
      border-color: rgba(79,70,229,.55);
      box-shadow: 0 0 18px rgba(79,70,229,.18);
    }
    .support-row svg{ width:18px; height:18px; opacity:.95; }

    /* Footer */
    footer{
      margin-top:54px;
      padding-top:18px;
      border-top:1px solid var(--border);
      color:var(--muted2);
      font-size:12px;
    }
    .footer-grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }
    .footer-links{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }
    .footer-links a{
      color:var(--muted);
      text-decoration:none;
      border-bottom:1px dashed rgba(255,255,255,.16);
    }
    .footer-links a:hover{
      border-bottom-color: rgba(79,70,229,.6);
      color:#d8d8ff;
    }
    .footer-meta{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }
    .avatar{
      width:34px;
      height:34px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.02);
      overflow:hidden;
      flex:0 0 auto;
    }
    .avatar img{
      width:100%;
      height:100%;
      display:block;
    }
    .disclaimer{
      margin-top:10px;
      color:var(--muted2);
      max-width: 90ch;
    }

    @media (max-width: 520px){
      .gh-link{ right:0; }
      .container{ padding:26px 16px 40px; }
      .section-title{ margin-top:34px; }
    }
  </style>
</head>

  <div class="container
